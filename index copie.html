	<link rel="stylesheet" href="style.css">
	<style>
		* { margin: 0; }
		body{ font-family: monospace; }

		:root {

			--cyan: #357AF1;
		}

		.color{
			margin: 2rem;
			padding: 0.5rem;
			width: max-content;
		}
		.swatch{
			width: 2.5cm;
			aspect-ratio: 1;
		}

		.label {
			font-family: monospace;
			padding-top: 0.5em;
			margin-top: 0.5em;
			border-top: 1px solid #CCC; 
		}

		
	</style>
	<script src="swatches.js" defer></script>
</head>
